<body>
  <header class="header">
    <a href="../" class="back-btn" aria-label="홈으로">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </a>
    <div class="header-title">
      <span class="header-icon">🤬</span>
      <h1>Mad Box</h1>
    </div>
    <div class="header-actions">
      <button type="button" class="header-btn" id="resetBtn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
      </button>
      <button type="button" class="header-btn" id="shareBtn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
      </button>
    </div>
  </header>

  <div class="warning-bar">이건 나만 보는 거예요 🔒 &middot; 초기화: 시크릿 모드 or 캐시 삭제</div>

  <main class="chat-area" id="chatArea">
    <div class="empty-state" id="emptyState">
      <div class="emoji">🤬</div>
      <p class="main-text">여기에 마음껏 쏟아내세요</p>
      <p class="sub-text">아무도 안 봐요 🤫</p>
    </div>
  </main>

  <nav class="toolbar" id="toolbar" aria-label="파괴 도구">
    <button type="button" data-mode="smash">🔨 부수기</button>
    <button type="button" data-mode="throw">🥫 깡통</button>
    <button type="button" data-mode="egg">🥚 계란</button>
    <button type="button" data-mode="gun">🔫 총쏘기</button>
    <button type="button" data-mode="yeot">🍬 엿던지기</button>
    <button type="button" data-mode="water">💦 물풍선</button>
    <button type="button" data-mode="paint">🎨 낙서</button>
    <button type="button" data-mode="lightning">⚡ 벼락</button>
    <button type="button" data-mode="axe">🪓 도끼</button>
    <button type="button" data-mode="dynamite">🧨 다이나마이트</button>
    <button type="button" data-mode="explode">💣 폭파</button>
    <button type="button" data-mode="burn">🔥 태우기</button>
  </nav>

  <footer class="input-bar">
    <input type="text" id="msgInput" placeholder="여기에 쏟아내세요..." autocomplete="off">
    <button type="button" class="send-btn" id="sendBtn" aria-label="보내기">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </footer>
