<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>퇴근 펀치 - 60초 스트레스 해소 클릭 게임 | Playground</title>
    <meta name="description" content="회사 건물이나 가상 직장 캐릭터를 60초 동안 신나게 두드리며 스트레스를 날려보는 클릭 미니게임.">
    <meta name="keywords" content="퇴근 펀치, 클릭 게임, 스트레스 해소 게임, 직장인 게임, 미니 게임, 웹 게임">
    <meta name="author" content="eottabom">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://eottabom.github.io/playground/punch-out/">
    <meta property="og:title" content="퇴근 펀치 - 60초 스트레스 해소 클릭 게임">
    <meta property="og:description" content="회사 건물이나 가상 직장 캐릭터를 60초 동안 두드리며 스트레스를 날려보세요.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://eottabom.github.io/playground/punch-out/">
    <meta property="og:locale" content="ko_KR">
    <meta property="og:site_name" content="Playground - eottabom">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="퇴근 펀치">
    <meta name="twitter:description" content="60초 동안 신나게 두드리며 스트레스를 날려보세요.">
    <meta name="theme-color" content="#1a1225">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5103032140213770"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <a href="../" class="back-btn" aria-label="홈으로">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </a>
        <div class="header-title">
            <span class="header-icon">🥊</span>
            <h1>퇴근 펀치</h1>
        </div>
        <button type="button" class="header-btn" id="restartBtn">처음으로</button>
    </header>

    <main class="page">
        <section class="panel panel--setup" id="setupPanel">
            <h2 class="hero-title">퇴근 전 60초만, 아무 생각 없이 퍽퍽</h2>
            <p class="hero-copy">실존 인물 대신 직장 스트레스를 상징하는 가상 타겟을 고르고, 1분 동안 마음껏 클릭하세요.</p>

            <div class="target-grid" role="radiogroup" aria-label="타겟 선택">
                <button type="button" class="target-card is-selected" data-target="building" aria-pressed="true">
                    <img src="assets/building-target.svg" alt="" class="target-card__art">
                    <span class="target-card__title">회사 건물</span>
                    <span class="target-card__desc">유리창 깨짐, 간판 흔들림, 균열 연출</span>
                </button>
                <button type="button" class="target-card" data-target="worker" aria-pressed="false">
                    <img src="assets/worker-target.svg" alt="" class="target-card__art">
                    <span class="target-card__title">가상 직장 캐릭터</span>
                    <span class="target-card__desc">안경 깨짐, 서류 폭발, 빙글별 연출</span>
                </button>
            </div>

            <label class="input-group" for="aliasInput">
                <span class="input-group__label">타겟 별명</span>
                <input id="aliasInput" class="input-group__field" type="text" maxlength="18" value="월요일 타워" autocomplete="off">
                <span class="input-group__hint">실명 대신 별명이나 상징명을 적어두세요</span>
            </label>

            <div class="setup-actions">
                <div class="setup-note">
                    <span>클릭만 하면 됩니다</span>
                    <span>60초 동안 자동으로 좌우 장갑이 번갈아 나갑니다</span>
                </div>
                <button type="button" class="start-btn" id="startBtn">1분 동안 날려버리기</button>
            </div>
        </section>

        <section class="panel panel--game hidden" id="gamePanel">
            <div class="hud">
                <div class="hud-card">
                    <span class="hud-card__label">남은 시간</span>
                    <strong class="hud-card__value" id="timerText">60.0</strong>
                </div>
                <div class="hud-card">
                    <span class="hud-card__label">총 타격</span>
                    <strong class="hud-card__value" id="scoreText">0</strong>
                </div>
                <div class="hud-card">
                    <span class="hud-card__label">현재 별명</span>
                    <strong class="hud-card__value hud-card__value--name" id="targetName">월요일 타워</strong>
                </div>
            </div>

            <button type="button" class="arena" id="arena">
                <div class="arena__scanlines" aria-hidden="true"></div>
                <div class="arena__burst" id="burst"></div>
                <div class="arena__target" id="arenaTarget">
                    <img id="targetImage" class="arena__image" src="assets/building-target.svg" alt="회사 건물 타겟">
                    <div class="damage damage--building" id="damageBuilding">
                        <span class="damage__sign"></span>
                        <span class="damage__crack damage__crack--a"></span>
                        <span class="damage__crack damage__crack--b"></span>
                        <span class="damage__crack damage__crack--c"></span>
                        <span class="damage__window damage__window--a"></span>
                        <span class="damage__window damage__window--b"></span>
                        <span class="damage__window damage__window--c"></span>
                        <span class="damage__debris damage__debris--a"></span>
                        <span class="damage__debris damage__debris--b"></span>
                        <span class="damage__debris damage__debris--c"></span>
                        <span class="damage__smoke damage__smoke--a"></span>
                        <span class="damage__smoke damage__smoke--b"></span>
                    </div>
                    <div class="damage damage--worker" id="damageWorker">
                        <span class="damage__face">
                            <span class="damage__brow damage__brow--left"></span>
                            <span class="damage__brow damage__brow--right"></span>
                            <span class="damage__mouth"></span>
                            <span class="damage__cheek damage__cheek--left"></span>
                            <span class="damage__cheek damage__cheek--right"></span>
                        </span>
                        <span class="damage__tie"></span>
                        <span class="damage__glass damage__glass--a"></span>
                        <span class="damage__glass damage__glass--b"></span>
                        <span class="damage__paper damage__paper--a"></span>
                        <span class="damage__paper damage__paper--b"></span>
                        <span class="damage__paper damage__paper--c"></span>
                        <span class="damage__star damage__star--a"></span>
                        <span class="damage__star damage__star--b"></span>
                        <span class="damage__star damage__star--c"></span>
                        <span class="damage__squiggle damage__squiggle--a"></span>
                        <span class="damage__squiggle damage__squiggle--b"></span>
                    </div>
                </div>
                <img id="leftGlove" class="glove glove--left" src="assets/glove-left.svg" alt="">
                <img id="rightGlove" class="glove glove--right" src="assets/glove-right.svg" alt="">
                <div class="impact-text impact-text--one" id="impactTextA"></div>
                <div class="impact-text impact-text--two" id="impactTextB"></div>
                <div class="arena__hint" id="arenaHint">여기를 빠르게 클릭하세요</div>
            </button>

            <div class="meter">
                <div class="meter__label">
                    <span>스트레스 해소 게이지</span>
                    <strong id="stressText">0%</strong>
                </div>
                <div class="meter__track">
                    <div class="meter__fill" id="stressFill"></div>
                </div>
            </div>
        </section>

        <section class="panel panel--result hidden" id="resultPanel">
            <div class="result-stamp">TIME OVER</div>
            <h2 class="result-title">오늘도 버텼다</h2>
            <p class="result-copy" id="resultCopy">월요일 타워 상대로 마음껏 쳤습니다.</p>
            <div class="result-grid">
                <article class="result-card">
                    <span class="result-card__label">총 타격 수</span>
                    <strong class="result-card__value" id="resultHits">0</strong>
                </article>
                <article class="result-card">
                    <span class="result-card__label">스트레스 해소</span>
                    <strong class="result-card__value" id="resultStress">0%</strong>
                </article>
                <article class="result-card">
                    <span class="result-card__label">최고 기록</span>
                    <strong class="result-card__value" id="bestScore">0</strong>
                </article>
            </div>
            <div class="result-actions">
                <button type="button" class="result-btn result-btn--secondary" id="changeTargetBtn">타겟 다시 고르기</button>
                <button type="button" class="result-btn result-btn--primary" id="retryBtn">한 판 더</button>
            </div>
        </section>
    </main>

    <div class="ad-section">
        <ins class="adsbygoogle"
            style="display:block"
            data-ad-format="autorelaxed"
            data-ad-client="ca-pub-5103032140213770"
            data-ad-slot="3384415421"></ins>
    </div>

    <noscript>
        <p class="no-script">이 게임은 JavaScript가 필요합니다.</p>
    </noscript>

    <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
    <script src="app.js"></script>
</body>
</html>
