  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --page-bg:

        linear-gradient(180deg, #100813, #17172d 50%, #0e223c);
      --card-bg: linear-gradient(160deg, rgba(34, 22, 48, 0.92), rgba(17, 39, 66, 0.92));
      --line: rgba(255, 212, 107, 0.18);
      --gold: #ffd46b;
      --text-soft: rgba(255, 245, 221, 0.66);

    body {
      min-height: 100vh;

      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--page-bg);
      font-family: 'Segoe UI', sans-serif;
      color: #f8f1de;
      padding: 24px;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:

        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: radial-gradient(circle at center, black, transparent 82%);
      pointer-events: none;
    }

    .top-bar {
      position: fixed;
      top: 0;
      right: 0;
      padding: 16px 24px;
      z-index: 100;
    }

    .lang-toggle {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 215, 0, 0.3);
      color: #ffd700;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.3s;
      letter-spacing: 1px;
    }

    .lang-toggle:hover {
      background: rgba(255, 215, 0, 0.15);
      border-color: #ffd700;
    }

    .hero {
      text-align: center;
      max-width: 760px;
    }

    h1 {
      font-size: clamp(2.8rem, 6vw, 4.6rem);
      margin-bottom: 0.7rem;
      background: linear-gradient(135deg, var(--gold), #ff9b54);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: var(--text-soft);
      margin-bottom: 2.6rem;
      font-size: 1.08rem;
      line-height: 1.65;
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.5rem;
      max-width: 920px;
      width: 90%;
    }

    .game-card {
      background: var(--card-bg);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 2rem 1.8rem;
      text-decoration: none;
      color: inherit;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 1rem;
    }

    .game-card:hover {
      transform: translateY(-8px);
      border-color: rgba(255, 212, 107, 0.5);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.24);
    }

    .game-card .icon {
      font-size: 3.8rem;
    }

    .game-card .name {
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--gold);
    }

    .game-card .desc {
      font-size: 0.94rem;
      color: rgba(255, 245, 221, 0.62);
      line-height: 1.5;

    footer {

      font-size: 0.85rem;

  <script>
    (adsbygoogle = window.adsbygoogle || []).push({});

    (function() {
      var lang = localStorage.getItem('playground-lang') || 'ko';
      var toggle = document.getElementById('langToggle');
      var subtitle = document.getElementById('subtitle');
      var texts = {
        ko: { subtitle: 'HTML5 미니 게임 & 재미 모음', toggle: 'EN' },
        en: { subtitle: 'HTML5 Mini Games & Fun Collection', toggle: '한국어' }
      };

      function applyLang(l) {
        lang = l;
        localStorage.setItem('playground-lang', l);
        document.documentElement.lang = l;
        subtitle.textContent = texts[l].subtitle;
        toggle.textContent = texts[l].toggle;
        document.querySelectorAll('[data-ko]').forEach(function(el) {
          el.textContent = el.getAttribute('data-' + l);
        });
      }

      toggle.addEventListener('click', function() {
        applyLang(lang === 'ko' ? 'en' : 'ko');
      });

      applyLang(lang);
    })();
  </script>
