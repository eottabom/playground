<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>고양이 잡기 - 아케이드 냥냥 게임 | Playground</title>
  <meta name="description" content="30초 안에 구멍에서 튀어나오는 고양이를 최대한 많이 잡아라! 레트로 아케이드 스타일 미니게임.">
  <meta name="keywords" content="고양이 잡기, 두더지 잡기, 아케이드 게임, 클릭 게임, 미니게임, cat whack, whack-a-mole">
  <meta name="author" content="eottabom">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://eottabom.github.io/playground/cat-whack/">
  <meta property="og:title" content="고양이 잡기 - 아케이드 냥냥 게임">
  <meta property="og:description" content="30초 안에 구멍에서 튀어나오는 고양이를 최대한 많이 잡아라!">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://eottabom.github.io/playground/cat-whack/">
  <meta property="og:locale" content="ko_KR">
  <meta property="og:site_name" content="Playground - eottabom">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="고양이 잡기 - 아케이드 냥냥 게임">
  <meta name="twitter:description" content="30초 안에 구멍에서 튀어나오는 고양이를 최대한 많이 잡아라!">
  <meta name="theme-color" content="#08000f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5103032140213770"
     crossorigin="anonymous"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- CRT scanlines overlay -->
  <div class="crt-overlay" aria-hidden="true"></div>

  <header class="header">
    <a href="../" class="back-btn" aria-label="홈으로">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="square"><path d="M15 18l-6-6 6-6"/></svg>
    </a>
    <div class="header-title">
      <span class="header-icon">🐱</span>
      <h1>고양이 잡기</h1>
    </div>
    <div class="header-right"></div>
  </header>

  <main class="main">

    <!-- 대기 화면 -->
    <div class="state" id="stateIdle">
      <div class="idle-box">
        <div class="arcade-title">
          <div class="arcade-title__line1">CAT</div>
          <div class="arcade-title__line2">WHACK!</div>
        </div>
        <div class="blink-text" id="bestScoreIdle"></div>
        <p class="idle-desc">구멍에서 튀어나오는 고양이를<br>빠르게 잡아라!</p>
        <div class="cat-type-guide">
          <span class="guide-item"><span class="guide-emoji">🐱</span><span class="guide-pts">1 PT</span></span>
          <span class="guide-item guide-item--gold"><span class="guide-emoji">😺</span><span class="guide-pts">3 PT</span></span>
        </div>
        <button class="btn-start" id="startBtn" type="button">
          <span class="blink-text">INSERT COIN</span>
        </button>
      </div>
    </div>

    <!-- 카운트다운 -->
    <div class="state hidden" id="stateCountdown">
      <div class="countdown-num" id="countdownNum">3</div>
    </div>

    <!-- 플레이 -->
    <div class="state hidden" id="statePlay">
      <div class="hud">
        <div class="hud-cell">
          <span class="hud-label">TIME</span>
          <span class="hud-val" id="timerText">30</span>
        </div>
        <div class="hud-timer-bar">
          <div class="hud-timer-fill" id="timerFill"></div>
        </div>
        <div class="hud-cell hud-cell--right">
          <span class="hud-label">SCORE</span>
          <span class="hud-val" id="scoreText">0</span>
        </div>
      </div>

      <div class="hole-grid" id="holeGrid">
        <!-- 9개 홀 JS에서 생성 -->
      </div>

      <div class="miss-text" id="missText"></div>
    </div>

    <!-- 결과 -->
    <div class="state hidden" id="stateResult">
      <div class="result-box">
        <div class="result-gameover">GAME OVER</div>
        <div class="result-grade-emoji" id="resultEmoji">🐱</div>
        <div class="result-score-label">SCORE</div>
        <div class="result-score" id="resultScore">0</div>
        <div class="result-grade" id="resultGrade">냥이 입문자</div>
        <div class="result-message" id="resultMessage"></div>
        <div class="result-best" id="resultBest"></div>
        <div class="result-actions">
          <button class="btn-retry" id="retryBtn" type="button">RETRY</button>
          <button class="btn-share" id="shareBtn" type="button">SHARE</button>
        </div>
      </div>
    </div>

  </main>

  <div class="toast" id="shareToast"></div>

  <noscript>
    <p style="text-align:center;padding:40px;color:#0f0;font-family:monospace;">JavaScript가 필요합니다.</p>
  </noscript>

  <script src="app.js"></script>
</body>
</html>
